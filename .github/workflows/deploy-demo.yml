name: Deploy to Demo Server (Timeweb)

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  COMPOSE_FILE: infra/docker/docker-compose.demo.yml

jobs:
  build:
    name: Build and Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: gisborn
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push API Gateway
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./services/api-gateway/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/gisborn/ocr-docs/api-gateway:latest
          cache-from: type=gha,scope=api-gateway
          cache-to: type=gha,mode=max,scope=api-gateway

      - name: Build and push Billing
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./services/billing/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/gisborn/ocr-docs/billing:latest
          cache-from: type=gha,scope=billing
          cache-to: type=gha,mode=max,scope=billing

      - name: Build and push Billing Webhook
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./services/billing-webhook-yookassa/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/gisborn/ocr-docs/billing-webhook-yookassa:latest
          cache-from: type=gha,scope=billing-webhook
          cache-to: type=gha,mode=max,scope=billing-webhook

      - name: Build and push Cabinet
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./services/cabinet/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/gisborn/ocr-docs/cabinet:latest
          cache-from: type=gha,scope=cabinet
          cache-to: type=gha,mode=max,scope=cabinet

      - name: Build and push Orchestrator
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./services/orchestrator/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/gisborn/ocr-docs/orchestrator:latest
          cache-from: type=gha,scope=orchestrator
          cache-to: type=gha,mode=max,scope=orchestrator

      - name: Build and push Landing
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./services/landing/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/gisborn/ocr-docs/landing:latest
          cache-from: type=gha,scope=landing
          cache-to: type=gha,mode=max,scope=landing

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: gisborn
          password: ${{ secrets.GHCR_PAT }}

      - name: Start test environment
        run: |
          docker compose -f infra/docker/docker-compose.test.yml pull
          docker compose -f infra/docker/docker-compose.test.yml up -d --pull always --force-recreate
          echo "Waiting for services..."
          sleep 20

      - name: Run database migrations
        env:
          DATABASE_URL: postgres://api_scan:api_scan_secret@localhost:15432/api_scan?sslmode=disable
          BILLING_DATABASE_URL: postgres://billing:billing_secret@localhost:15433/billing_db?sslmode=disable
        run: |
          go install github.com/pressly/goose/v3/cmd/goose@v3.24.0
          cd migrations/main && goose postgres "$DATABASE_URL" up
          cd ../../migrations/billing && goose postgres "$BILLING_DATABASE_URL" up

      - name: Run E2E tests
        env:
          CABINET_URL: http://localhost:8084
          API_GATEWAY_URL: http://localhost:8080
          DATABASE_URL: postgres://api_scan:api_scan_secret@localhost:15432/api_scan?sslmode=disable
          BILLING_DATABASE_URL: postgres://billing:billing_secret@localhost:15433/billing_db?sslmode=disable
          YANDEX_VISION_API_KEY: ${{ secrets.YANDEX_VISION_API_KEY }}
        run: go test -v -timeout=120s ./tests/integration/...

      - name: Dump logs on failure
        if: failure()
        run: docker compose -f infra/docker/docker-compose.test.yml logs

      - name: Cleanup
        if: always()
        run: docker compose -f infra/docker/docker-compose.test.yml down -v

  deploy:
    name: Deploy to Timeweb Demo Server
    runs-on: ubuntu-latest
    needs: [build, e2e]
    environment: demo

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail
            cd ~/api-scan

            echo "=== Login to GHCR ==="
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u gisborn --password-stdin

            echo "=== Pulling latest images ==="
            docker compose --env-file .env -f infra/docker/docker-compose.demo.yml pull

            echo "=== Running database migrations ==="
            export PATH=$PATH:$HOME/go/bin
            source .env
            cd ~/api-scan/migrations/main && goose postgres "postgres://${POSTGRES_USER:-api_scan}:${POSTGRES_PASSWORD}@localhost:15432/${POSTGRES_DB:-api_scan}?sslmode=disable" up
            cd ~/api-scan/migrations/billing && goose postgres "postgres://${POSTGRES_BILLING_USER:-billing}:${POSTGRES_BILLING_PASSWORD}@localhost:15433/${POSTGRES_BILLING_DB:-billing_db}?sslmode=disable" up
            cd ~/api-scan

            echo "=== Starting services ==="
            docker compose --env-file .env -f infra/docker/docker-compose.demo.yml up -d --remove-orphans

            echo "=== Cleanup ==="
            docker system prune -f

            echo "=== Health check ==="
            sleep 5
            curl -fsS http://localhost:8080/health || echo "API Gateway health check failed"
