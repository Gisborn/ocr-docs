name: CI

on:
  pull_request:
    branches: [main, demo]
  push:
    branches: [main, demo]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64
          args: --timeout=5m
          working-directory: .

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: api_scan
          POSTGRES_PASSWORD: api_scan_secret
          POSTGRES_DB: api_scan
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      postgres-billing:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: billing
          POSTGRES_PASSWORD: billing_secret
          POSTGRES_DB: billing_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5433:5432
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Download dependencies
        run: go mod download

      - name: Run unit tests
        env:
          TEST_DATABASE_URL: postgres://api_scan:api_scan_secret@localhost:5432/api_scan?sslmode=disable
          TEST_BILLING_DATABASE_URL: postgres://billing:billing_secret@localhost:5433/billing_db?sslmode=disable
        run: go test -race -coverprofile=coverage.out ./pkg/... ./services/...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: api_scan
          POSTGRES_PASSWORD: api_scan_secret
          POSTGRES_DB: api_scan
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      postgres-billing:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: billing
          POSTGRES_PASSWORD: billing_secret
          POSTGRES_DB: billing_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5433:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install goose
        run: go install github.com/pressly/goose/v3/cmd/goose@latest

      - name: Download dependencies
        run: go mod download

      - name: Run main migrations
        env:
          DATABASE_URL: postgres://api_scan:api_scan_secret@localhost:5432/api_scan?sslmode=disable
        run: |
          cd migrations/main
          goose postgres "$DATABASE_URL" up

      - name: Run billing migrations
        env:
          DATABASE_URL: postgres://billing:billing_secret@localhost:5433/billing_db?sslmode=disable
        run: |
          cd migrations/billing
          goose postgres "$DATABASE_URL" up

      - name: Run integration tests
        env:
          DATABASE_URL: postgres://api_scan:api_scan_secret@localhost:5432/api_scan?sslmode=disable
          BILLING_DATABASE_URL: postgres://billing:billing_secret@localhost:5433/billing_db?sslmode=disable
          YANDEX_VISION_API_KEY: ${{ secrets.YANDEX_VISION_API_KEY }}
        run: go test -v -tags=integration ./tests/integration/...

  build-images:
    name: Build Images
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API Gateway
        run: docker build -f services/api-gateway/Dockerfile .

      - name: Build Billing
        run: docker build -f services/billing/Dockerfile .

      - name: Build Billing Webhook
        run: docker build -f services/billing-webhook-yookassa/Dockerfile .

      - name: Build Cabinet
        run: docker build -f services/cabinet/Dockerfile .

      - name: Build Orchestrator
        run: docker build -f services/orchestrator/Dockerfile .

      - name: Build Landing
        run: docker build -f services/landing/Dockerfile .
