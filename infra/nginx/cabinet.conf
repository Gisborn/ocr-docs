# API-Scan — Cabinet Service (Личный Кабинет)
# Домен: cabinet.aywaa.ru
#
# Установка:
#   sudo cp infra/nginx/cabinet.conf /etc/nginx/sites-available/cabinet
#   sudo ln -s /etc/nginx/sites-available/cabinet /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d cabinet.aywaa.ru

server {
    listen 80;
    listen [::]:80;
    server_name cabinet.aywaa.ru;

    # Certbot сам добавит здесь redirect на HTTPS после выпуска сертификата
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cabinet.aywaa.ru;

    # SSL будет настроен certbot'ом автоматически
    # ssl_certificate /etc/letsencrypt/live/cabinet.aywaa.ru/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/cabinet.aywaa.ru/privkey.pem;

    access_log /var/log/nginx/cabinet-access.log;
    error_log /var/log/nginx/cabinet-error.log;

    client_max_body_size 10M;

    # Весь трафик проксируется на Cabinet Service
    location / {
        proxy_pass http://127.0.0.1:8084;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 60s;

        # CORS preflight
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # Legal documents — отдаются самим Cabinet Service
    location /legal/ {
        proxy_pass http://127.0.0.1:8084;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
