# API-Scan — API Gateway + Webhooks
# Домен: api.aywaa.ru
#
# Установка:
#   sudo cp infra/nginx/api-scan.conf /etc/nginx/sites-available/api-scan
#   sudo ln -s /etc/nginx/sites-available/api-scan /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d api.aywaa.ru

server {
    listen 80;
    listen [::]:80;
    server_name api.aywaa.ru;

    # Certbot сам добавит здесь redirect на HTTPS после выпуска сертификата

    location / {
        return 404;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.aywaa.ru;

    # SSL будет настроен certbot'ом автоматически
    # ssl_certificate /etc/letsencrypt/live/api.aywaa.ru/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.aywaa.ru/privkey.pem;

    access_log /var/log/nginx/api-scan-access.log;
    error_log /var/log/nginx/api-scan-error.log;

    client_max_body_size 10M;

    # API Gateway — основные API-эндпоинты
    location /v1/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 60s;

        # CORS preflight (если nginx не настроен глобально)
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-Api-Key' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # ЮКасса Webhooks — публичные webhook'и от платёжной системы
    location /webhooks/yookassa/ {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 60s;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://127.0.0.1:8080/health;
        proxy_set_header Host $host;
        access_log off;
    }

    # Корень — 404, API не имеет UI
    location = / {
        return 404;
    }
}
