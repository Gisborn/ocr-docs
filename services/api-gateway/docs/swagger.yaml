        in: header
        name: Authorization
        required: true
        type: string
      - description: Idempotency key for recognize requests
        in: header
        name: Idempotency-Key
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.RecognizeResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "404":
          description: Not found
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "429":
          description: Rate limit exceeded
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "503":
          description: Service unavailable
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      summary: Proxy request to downstream services
      tags:
      - proxy
  /v1/billing/transactions/{id}/commit:
