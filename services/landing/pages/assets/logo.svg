  <rect x="250" y="64" width="10" height="10" rx="2" fill="#3b82f6" opacity="0.6"/>
  <rect x="265" y="64" width="10" height="10" rx="2" fill="#60a5fa" opacity="0.4"/>
  <rect x="280" y="64" width="10" height="10" rx="2" fill="#93c5fd" opacity="0.25"/>
  <rect x="295" y="64" width="10" height="10" rx="2" fill="#bfdbfe" opacity="0.15"/>
  <rect x="310" y="64" width="10" height="10" rx="2" fill="#dbeafe" opacity="0.1"/>

  <!-- Stripe 4 -->
