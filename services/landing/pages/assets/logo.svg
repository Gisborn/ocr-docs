  <polygon points="72,50 82,80 92,80 82,50" fill="#ffffff"/>

  <!-- Horizontal stripes fading to dots -->
  <!-- Stripe 1 -->
  <rect x="140" y="32" width="90" height="10" rx="2" fill="url(#stripe1)"/>
  <rect x="235" y="32" width="10" height="10" rx="2" fill="#60a5fa" opacity="0.8"/>
  <rect x="250" y="32" width="10" height="10" rx="2" fill="#93c5fd" opacity="0.6"/>
  <rect x="265" y="32" width="10" height="10" rx="2" fill="#bfdbfe" opacity="0.4"/>
  <rect x="280" y="32" width="10" height="10" rx="2" fill="#dbeafe" opacity="0.25"/>

  <!-- Stripe 2 -->
  <rect x="140" y="48" width="90" height="10" rx="2" fill="url(#stripe2)"/>
  <rect x="235" y="48" width="10" height="10" rx="2" fill="#3b82f6" opacity="0.8"/>
  <rect x="250" y="48" width="10" height="10" rx="2" fill="#60a5fa" opacity="0.6"/>
  <rect x="265" y="48" width="10" height="10" rx="2" fill="#93c5fd" opacity="0.4"/>
  <rect x="280" y="48" width="10" height="10" rx="2" fill="#bfdbfe" opacity="0.25"/>
  <rect x="295" y="48" width="10" height="10" rx="2" fill="#dbeafe" opacity="0.15"/>

