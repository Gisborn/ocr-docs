  <rect x="235" y="80" width="10" height="10" rx="2" fill="#1d4ed8" opacity="0.8"/>
  <rect x="250" y="80" width="10" height="10" rx="2" fill="#2563eb" opacity="0.6"/>
  <rect x="265" y="80" width="10" height="10" rx="2" fill="#3b82f6" opacity="0.4"/>
  <rect x="280" y="80" width="10" height="10" rx="2" fill="#60a5fa" opacity="0.25"/>
  <rect x="295" y="80" width="10" height="10" rx="2" fill="#93c5fd" opacity="0.15"/>
