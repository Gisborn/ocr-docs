<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${SERVICE_NAME}</title>
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32x32.png">
    <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
        }
        .logo {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-size: 48px;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 12px;
        }
        .logo svg { height: 52px; width: auto; }
        .tagline {
            font-size: 20px;
            opacity: 0.9;
            margin-bottom: 40px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 28px;
            border-radius: 10px;
            border: none;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
        }
        .btn-primary {
            background: #fff;
            color: #4f46e5;
        }
        .btn-primary:hover {
            background: #f3f4f6;
            transform: translateY(-1px);
        }
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 16px;
            font-size: 12px;
            opacity: 0.7;
            text-align: center;
        }
        .footer a {
            color: #fff;
            text-decoration: none;
            margin: 0 8px;
        }
        .footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="logo">
        <svg viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="agrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#2563eb"/><stop offset="100%" stop-color="#1e40af"/></linearGradient></defs><polygon points="20,55 35,5 55,5 70,55 55,55 52,45 38,45 35,55" fill="url(#agrad)"/><polygon points="40,20 45,35 50,35 45,20" fill="#ffffff"/><rect x="78" y="12" width="6" height="6" rx="1" fill="#2563eb" opacity="0.9"/><rect x="88" y="12" width="6" height="6" rx="1" fill="#3b82f6" opacity="0.8"/><rect x="98" y="12" width="6" height="6" rx="1" fill="#60a5fa" opacity="0.7"/><rect x="108" y="12" width="6" height="6" rx="1" fill="#93c5fd" opacity="0.6"/><rect x="78" y="24" width="6" height="6" rx="1" fill="#1d4ed8" opacity="0.9"/><rect x="88" y="24" width="6" height="6" rx="1" fill="#2563eb" opacity="0.8"/><rect x="98" y="24" width="6" height="6" rx="1" fill="#3b82f6" opacity="0.7"/><rect x="108" y="24" width="6" height="6" rx="1" fill="#60a5fa" opacity="0.6"/><rect x="118" y="24" width="6" height="6" rx="1" fill="#93c5fd" opacity="0.5"/><rect x="78" y="36" width="6" height="6" rx="1" fill="#1e3a8a" opacity="0.9"/><rect x="88" y="36" width="6" height="6" rx="1" fill="#1d4ed8" opacity="0.8"/><rect x="98" y="36" width="6" height="6" rx="1" fill="#2563eb" opacity="0.7"/><rect x="108" y="36" width="6" height="6" rx="1" fill="#3b82f6" opacity="0.6"/><rect x="118" y="36" width="6" height="6" rx="1" fill="#60a5fa" opacity="0.5"/><rect x="128" y="36" width="6" height="6" rx="1" fill="#93c5fd" opacity="0.4"/><rect x="78" y="48" width="6" height="6" rx="1" fill="#172554" opacity="0.9"/><rect x="88" y="48" width="6" height="6" rx="1" fill="#1e3a8a" opacity="0.8"/><rect x="98" y="48" width="6" height="6" rx="1" fill="#1d4ed8" opacity="0.7"/><rect x="108" y="48" width="6" height="6" rx="1" fill="#2563eb" opacity="0.6"/><rect x="118" y="48" width="6" height="6" rx="1" fill="#3b82f6" opacity="0.5"/><rect x="128" y="48" width="6" height="6" rx="1" fill="#60a5fa" opacity="0.4"/><rect x="138" y="48" width="6" height="6" rx="1" fill="#93c5fd" opacity="0.3"/></svg>
        ${SERVICE_NAME}
    </div>
    <div class="tagline">${SERVICE_TAGLINE}</div>
    <a href="${CABINET_URL}" class="btn btn-primary">Войти в кабинет →</a>

    <div class="footer">
        <a href="${CABINET_URL}/legal/privacy" target="_blank">Политика обработки ПДн</a>
        <a href="${CABINET_URL}/legal/terms" target="_blank">Условия использования</a>
        <a href="mailto:support@adocs.ru">Поддержка</a>
    </div>
</body>
</html>
