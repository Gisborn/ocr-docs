services:
  # Main API Database (api_scan_main)
  postgres:
    image: postgres:16-alpine
    container_name: api-scan-postgres
    environment:
      POSTGRES_USER: api_scan
      POSTGRES_PASSWORD: api_scan_secret
      POSTGRES_DB: api_scan
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/initdb/main:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U api_scan -d api_scan"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - api-scan-network

  # Billing Database (billing_db)
  postgres-billing:
    image: postgres:16-alpine
    container_name: api-scan-postgres-billing
    environment:
      POSTGRES_USER: billing
      POSTGRES_PASSWORD: billing_secret
      POSTGRES_DB: billing_db
    ports:
      - "15433:5432"
    volumes:
      - billing_data:/var/lib/postgresql/data
      - ./scripts/initdb/billing:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U billing -d billing_db"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - api-scan-network

  redis:
    image: redis:7-alpine
    container_name: api-scan-redis
    # Port not exposed - only internal Docker network access
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - api-scan-network

  # Мок OCR-провайдера для локальной разработки
  ocr-mock:
    image: wiremock/wiremock:3.3.1
    container_name: api-scan-ocr-mock
    ports:
      - "28080:8080"
    volumes:
      - ./tests/mocks/ocr:/home/wiremock
    command: ["--global-stubbing", "--verbose"]
    networks:
      - api-scan-network
    profiles:
      - mock

  # Billing Service (API для внутренних вызовов)
  billing:
    build:
      context: .
      dockerfile: services/billing/Dockerfile
    container_name: api-scan-billing
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://billing:billing_secret@postgres-billing:5432/billing_db"
      YOOKASSA_SHOP_ID: "${YOOKASSA_SHOP_ID:-}"
      YOOKASSA_SECRET_KEY: "${YOOKASSA_SECRET_KEY:-}"
      BILLING_SERVICE_TOKEN: "${BILLING_SERVICE_TOKEN:-internal-service-token}"
    ports:
      - "18081:8080"
    depends_on:
      postgres-billing:
        condition: service_healthy
    networks:
      - api-scan-network
    profiles:
      - billing

  # Orchestrator (OCR processing)
  orchestrator:
    build:
      context: .
      dockerfile: services/orchestrator/Dockerfile
    container_name: api-scan-orchestrator
    environment:
      PORT: "8080"
      YANDEX_VISION_API_KEY: "${YANDEX_VISION_API_KEY:-}"
      YANDEX_VISION_USE_V2: "${YANDEX_VISION_USE_V2:-true}"
      YANDEX_VISION_MODEL: "${YANDEX_VISION_MODEL:-passport}"
      YANDEX_FOLDER_ID: "${YANDEX_FOLDER_ID:-}"
      VK_VISION_API_KEY: "${VK_VISION_API_KEY:-}"
      VK_FOLDER_ID: "${VK_FOLDER_ID:-}"
      BILLING_API_URL: "http://billing:8080"
      BILLING_SERVICE_TOKEN: "${BILLING_SERVICE_TOKEN:-internal-service-token}"
      OCR_CONFIDENCE_THRESHOLD: "0.80"
    ports:
      - "18083:8080"
    depends_on:
      billing:
        condition: service_started
    networks:
      - api-scan-network
    profiles:
      - orchestrator

  # API Gateway (единая точка входа)
  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: api-scan-api-gateway
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://api_scan:api_scan_secret@postgres:5432/api_scan"
      REDIS_ADDR: "redis:6379"
      ORCHESTRATOR_URL: "http://orchestrator:8080"
      BILLING_URL: "http://billing:8080"
      BILLING_WEBHOOK_URL: "http://billing-webhook-yookassa:8080"
      CABINET_URL: "http://cabinet:8080"
    ports:
      - "18080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      billing:
        condition: service_started
      billing-webhook-yookassa:
        condition: service_started
      cabinet:
        condition: service_started
      orchestrator:
        condition: service_started
    networks:
      - api-scan-network
    profiles:
      - gateway

  # Cabinet Service (личный кабинет)
  cabinet:
    build:
      context: .
      dockerfile: services/cabinet/Dockerfile
    container_name: api-scan-cabinet
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://api_scan:api_scan_secret@postgres:5432/api_scan"
      BILLING_URL: "http://billing:8080"
      BILLING_SERVICE_TOKEN: "${BILLING_SERVICE_TOKEN:-internal-service-token}"
    ports:
      - "18084:8080"
    depends_on:
      postgres:
        condition: service_healthy
      billing:
        condition: service_started
    networks:
      - api-scan-network
    profiles:
      - cabinet

  # Billing Webhook Service (публичные webhook'и от ЮКассы)
  billing-webhook-yookassa:
    build:
      context: .
      dockerfile: services/billing-webhook-yookassa/Dockerfile
    container_name: api-scan-billing-webhook-yookassa
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://billing:billing_secret@postgres-billing:5432/billing_db"
      YOOKASSA_SECRET_KEY: "${YOOKASSA_SECRET_KEY:-}"
      IP_WHITELIST: "185.71.76.0/27,185.71.77.0/27,77.75.153.0/25"
    ports:
      - "18082:8080"
    depends_on:
      postgres-billing:
        condition: service_healthy
    networks:
      - api-scan-network
    profiles:
      - billing

volumes:
  postgres_data:
    driver: local
  billing_data:
    driver: local
  redis_data:
    driver: local

networks:
  api-scan-network:
    driver: bridge
