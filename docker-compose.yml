services:
  # Main API Database (api_scan_main)
  postgres:
    image: postgres:16-alpine
    container_name: api-scan-postgres
    environment:
      POSTGRES_USER: api_scan
      POSTGRES_PASSWORD: api_scan_secret
      POSTGRES_DB: api_scan
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/main:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U api_scan -d api_scan"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - api-scan-network

  # Billing Database (billing_db)
  postgres-billing:
    image: postgres:16-alpine
    container_name: api-scan-postgres-billing
    environment:
      POSTGRES_USER: billing
      POSTGRES_PASSWORD: billing_secret
      POSTGRES_DB: billing_db
    ports:
      - "5433:5432"
    volumes:
      - billing_data:/var/lib/postgresql/data
      - ./migrations/billing:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U billing -d billing_db"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - api-scan-network

  redis:
    image: redis:7-alpine
    container_name: api-scan-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - api-scan-network

  # Мок OCR-провайдера для локальной разработки
  ocr-mock:
    image: wiremock/wiremock:3.3.1
    container_name: api-scan-ocr-mock
    ports:
      - "8080:8080"
    volumes:
      - ./tests/mocks/ocr:/home/wiremock
    command: ["--global-stubbing", "--verbose"]
    networks:
      - api-scan-network
    profiles:
      - mock

  # Billing Service (API для внутренних вызовов)
  billing:
    build:
      context: .
      dockerfile: services/billing/Dockerfile
    container_name: api-scan-billing
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://billing:billing_secret@postgres-billing:5432/billing_db"
      YOOKASSA_SHOP_ID: "${YOOKASSA_SHOP_ID:-}"
      YOOKASSA_SECRET_KEY: "${YOOKASSA_SECRET_KEY:-}"
    ports:
      - "8081:8080"
    depends_on:
      postgres-billing:
        condition: service_healthy
    networks:
      - api-scan-network
    profiles:
      - billing

  # API Gateway (единая точка входа)
  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: api-scan-api-gateway
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://api_scan:api_scan_secret@postgres:5432/api_scan"
      REDIS_ADDR: "redis:6379"
      ORCHESTRATOR_URL: "http://orchestrator:8080"
      BILLING_URL: "http://billing:8080"
      BILLING_WEBHOOK_URL: "http://billing-webhook-yookassa:8080"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      billing:
        condition: service_started
      billing-webhook-yookassa:
        condition: service_started
    networks:
      - api-scan-network
    profiles:
      - gateway

  # Cabinet Service (личный кабинет)
  cabinet:
    build:
      context: .
      dockerfile: services/cabinet/Dockerfile
    container_name: api-scan-cabinet
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://api_scan:api_scan_secret@postgres:5432/api_scan"
      BILLING_URL: "http://billing:8080"
      BILLING_SERVICE_TOKEN: "${BILLING_SERVICE_TOKEN:-}"
    ports:
      - "8084:8080"
    depends_on:
      postgres:
        condition: service_healthy
      billing:
        condition: service_started
    networks:
      - api-scan-network
    profiles:
      - cabinet

  # Billing Webhook Service (публичные webhook'и от ЮКассы)
  billing-webhook-yookassa:
    build:
      context: .
      dockerfile: services/billing-webhook-yookassa/Dockerfile
    container_name: api-scan-billing-webhook-yookassa
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://billing:billing_secret@postgres-billing:5432/billing_db"
      YOOKASSA_SECRET_KEY: "${YOOKASSA_SECRET_KEY:-}"
      IP_WHITELIST: "185.71.76.0/27,185.71.77.0/27,77.75.153.0/25"
    ports:
      - "8082:8080"
    depends_on:
      postgres-billing:
        condition: service_healthy
    networks:
      - api-scan-network
    profiles:
      - billing

volumes:
  postgres_data:
    driver: local
  billing_data:
    driver: local
  redis_data:
    driver: local

networks:
  api-scan-network:
    driver: bridge
